<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPlayBack | Gaming Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="theme-color" content="#ff5500">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/681/681054.png">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brandOrange: '#ff5500',
                        darkSection: '#18181b',
                        darkBg: '#0f0f11',
                        darkCard: '#1e1e24'
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease; }
        .hide-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #ff5500; border-radius: 10px; }
        
        /* Animación Chat Pro */
        #chat-window {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0.8) translateY(100px);
            opacity: 0;
            pointer-events: none;
        }
        #chat-window.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
        }
        .dark .glass-effect { background: rgba(30, 30, 36, 0.9); }
    </style>
</head>
<body class="antialiased font-sans bg-[#fcfcfc] text-[#111] dark:bg-darkBg dark:text-gray-100">

    <div id="install-banner" class="hidden fixed top-0 left-0 w-full bg-brandOrange text-white p-3 z-[100] flex justify-between items-center md:hidden">
        <span class="text-xs font-bold tracking-widest uppercase">Instalá la App para mejor experiencia</span>
        <button id="install-btn" class="bg-white text-brandOrange px-4 py-1 rounded-full text-xs font-black">DESCARGAR</button>
    </div>

    <nav class="flex justify-between items-center px-6 md:px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-darkSection transition-colors sticky top-0 z-50">
        <div class="font-bold text-lg tracking-wide uppercase">CyberPlayBack</div>
        <div class="hidden md:flex space-x-8 text-[11px] font-bold tracking-widest text-gray-500 dark:text-gray-400">
            <a href="#tarifas" class="hover:text-brandOrange transition-all hover:tracking-widest">TARIFAS</a>
            <a href="#hardware" class="hover:text-brandOrange transition-all hover:tracking-widest">PRODUCTOS</a>
            <a href="#comida" class="hover:text-brandOrange transition-all hover:tracking-widest">KIOSCO</a>
        </div>
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-yellow-400">
                <i class="fas fa-moon text-lg" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <div class="fixed bottom-6 right-6 z-[60] flex flex-col items-end">
        <div id="chat-window" class="w-[90vw] md:w-[450px] h-[550px] glass-effect rounded-3xl shadow-2xl border border-gray-200 dark:border-gray-800 overflow-hidden mb-6 flex flex-col">
            <div class="bg-brandOrange p-5 text-white flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="w-10 h-10 bg-white rounded-full p-1">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 border-2 border-brandOrange rounded-full"></span>
                    </div>
                    <div>
                        <p class="text-xs font-black tracking-widest leading-none">PLAYBACK AI</p>
                        <p class="text-[10px] opacity-80 uppercase">Soporte Inteligente</p>
                    </div>
                </div>
                <button onclick="toggleChat()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/20 transition-all">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 hide-scrollbar bg-gray-50/50 dark:bg-black/20">
                <div class="flex flex-col gap-1">
                    <span class="text-[9px] font-bold text-gray-400 ml-2 uppercase">Cyber AI</span>
                    <div class="bg-white dark:bg-darkCard p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 dark:border-gray-800 text-sm">
                        ¡Bienvenido a CyberPlayBack! Soy tu asistente. Puedo informarte sobre precios, hardware disponible o ayudarte con dudas generales. ¿En qué te ayudo?
                    </div>
                </div>
            </div>

            <div class="p-4 bg-white dark:bg-darkSection border-t border-gray-100 dark:border-gray-800">
                <div class="flex items-center gap-2 bg-gray-100 dark:bg-darkBg rounded-2xl px-4 py-2">
                    <input id="chat-input" type="text" placeholder="Hazme una pregunta..." class="flex-1 bg-transparent border-none text-sm focus:ring-0 outline-none dark:text-white">
                    <button onclick="sendMessage()" class="text-brandOrange p-2 hover:scale-110 transition-transform">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <button onclick="toggleChat()" class="w-16 h-16 bg-brandOrange text-white rounded-2xl shadow-[0_10px_30px_rgba(255,85,0,0.4)] hover:scale-105 transition-all flex items-center justify-center text-3xl">
            <i class="fas fa-comment-dots animate-bounce"></i>
        </button>
    </div>

    <audio id="pop-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
    <audio id="send-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <script>
        // --- 1. Lógica PWA (Instalación) ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-banner').classList.add('hidden');
                }
            }
        });

        // --- 2. Sonidos ---
        const playSfx = (id) => {
            const audio = document.getElementById(id);
            audio.volume = 0.2;
            audio.currentTime = 0;
            audio.play();
        }

        // --- 3. IA de Chat ---
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.classList.toggle('active');
            if(win.classList.contains('active')) playSfx('pop-sound');
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const container = document.getElementById('chat-messages');
            if (!input.value.trim()) return;

            const userText = input.value;
            input.value = "";
            playSfx('send-sound');

            // Renderizar Mensaje Usuario
            container.innerHTML += `
                <div class="flex flex-col items-end gap-1">
                    <span class="text-[9px] font-bold text-gray-400 mr-2 uppercase">Vos</span>
                    <div class="bg-brandOrange text-white p-4 rounded-2xl rounded-tr-none shadow-md text-sm max-w-[85%]">
                        ${userText}
                    </div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;

            // Simular pensamiento de IA
            const typing = document.createElement('div');
            typing.className = "text-[10px] text-gray-400 animate-pulse italic ml-2";
            typing.innerText = "CyberIA está escribiendo...";
            container.appendChild(typing);

            setTimeout(() => {
                typing.remove();
                let response = "";
                const msg = userText.toLowerCase();

                // Lógica de "IA Real" (Base de conocimiento local)
                if(msg.includes("precio") || msg.includes("cuanto sale")) {
                    response = "La hora suelta sale $2.300, pero te conviene la Promo Trasnoche de $9.000 por 8 horas.";
                } else if(msg.includes("donde queda") || msg.includes("ubicacion")) {
                    response = "Estamos en 25 de Mayo 657, San Miguel de Tucumán. ¡En pleno centro!";
                } else if(msg.includes("pc") || msg.includes("tarjeta")) {
                    response = "Tenemos máquinas con RTX 3060 hasta 4070. Todas con monitores de 144Hz o 165Hz.";
                } else if(msg.includes("abierto") || msg.includes("hora")) {
                    response = "Abrimos las 24 horas de Lunes a Sábado. Los domingos desde las 15:00.";
                } else {
                    // Respuesta genérica inteligente
                    response = "Interesante pregunta. Como IA del Cyber, te puedo decir que lo mejor para eso es venir a una de nuestras PCs con RTX 4070. ¿Querés que te pase el WhatsApp para reservar?";
                }

                container.innerHTML += `
                    <div class="flex flex-col gap-1">
                        <span class="text-[9px] font-bold text-gray-400 ml-2 uppercase">Cyber AI</span>
                        <div class="bg-white dark:bg-darkCard p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 dark:border-gray-800 text-sm">
                            ${response}
                        </div>
                    </div>
                `;
                container.scrollTop = container.scrollHeight;
                playSfx('pop-sound');
            }, 1000);
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // El resto de la lógica del Dark Mode y el mapa de PCs es la misma del código anterior.
    </script>
</body>
</html>
