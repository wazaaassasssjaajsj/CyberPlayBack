<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPlayBack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brandOrange: '#ff5500',
                        darkSection: '#18181b',
                        darkBg: '#0f0f11',
                        darkCard: '#1e1e24'
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .hide-scrollbar::-webkit-scrollbar { height: 6px; }
        .hide-scrollbar::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 10px; }
        .dark .hide-scrollbar::-webkit-scrollbar-track { background: #333; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #ff5500; border-radius: 10px; }
        
        @keyframes slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }
        .carousel-track {
            display: flex;
            width: max-content;
            animation: slide 50s linear infinite;
        }
        .carousel-track:hover { animation-play-state: paused; }
        .review-card { width: 340px; flex-shrink: 0; white-space: normal; }
        
        .mask-edges {
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }

        /* Estilo para el logo en el nav */
        .nav-logo {
            height: 32px; /* Ajusta según prefieras */
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="antialiased font-sans bg-[#fcfcfc] text-[#111] dark:bg-darkBg dark:text-gray-100">

    <audio id="move-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

    <nav class="flex justify-between items-center px-6 md:px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-darkSection transition-colors sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="CyberPlayBack Logo" class="nav-logo">
            <div class="font-bold text-lg tracking-wide">CyberPlayBack</div>
        </div>
        
        <div class="hidden md:flex space-x-8 text-[11px] font-bold tracking-widest text-gray-500 dark:text-gray-400">
            <a href="#tarifas" class="hover:text-brandOrange transition-colors">TARIFAS</a>
            <a href="#hardware" class="hover:text-brandOrange transition-colors">PRODUCTOS</a>
            <a href="#comida" class="hover:text-brandOrange transition-colors">KIOSCO</a>
            <a href="#opiniones" class="hover:text-brandOrange transition-colors">OPINIONES</a>
        </div>
        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-yellow-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                <i class="fas fa-moon text-lg" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <section class="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-gray-200 dark:divide-gray-800 border-b border-gray-200 dark:divide-gray-800 bg-white dark:bg-darkSection text-center transition-colors">
        <div class="py-8 md:py-12">
            <p class="text-[11px] font-bold text-gray-500 tracking-widest mb-2">PC</p>
            <p class="text-4xl md:text-5xl font-extrabold text-brandOrange">+20</p>
        </div>
        <div class="py-8 md:py-12">
            <p class="text-[11px] font-bold text-gray-500 tracking-widest mb-2">LATENCIA</p>
            <p class="text-4xl md:text-5xl font-extrabold text-brandOrange">60ms</p>
        </div>
        <div class="py-8 md:py-12">
            <p class="text-[11px] font-bold text-gray-500 tracking-widest mb-2">DISPONIBILIDAD</p>
            <p class="text-4xl md:text-5xl font-extrabold text-brandOrange">24/7</p>
        </div>
    </section>

    <section id="opiniones" class="py-16 overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 md:px-8 mb-8">
            <p class="text-[11px] font-bold text-gray-500 tracking-widest mb-2">RESEÑAS</p>
            <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight">Opiniones de nuestros Clientes</h2>
        </div>
        <div class="relative w-full overflow-hidden mask-edges py-2">
            <div class="carousel-track gap-4 md:gap-6 pr-4 md:pr-6" id="reviews-track"></div>
        </div>
    </section>

    <div id="review-modal" class="hidden fixed inset-0 z-[120] bg-black/70 flex items-center justify-center p-4 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-darkCard rounded-3xl p-6 md:p-8 max-w-lg w-full relative transform scale-95 transition-transform duration-300 shadow-2xl border border-gray-200 dark:border-gray-700" id="review-modal-content">
            <button id="close-modal" class="absolute top-4 right-4 text-gray-400 hover:text-brandOrange transition-colors w-8 h-8 flex justify-center items-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                <i class="fas fa-times text-xl"></i>
            </button>
            <div id="modal-stars" class="flex gap-1 mb-4"></div>
            <h3 id="modal-name" class="font-bold text-xl mb-4 dark:text-white"></h3>
            <p id="modal-text" class="text-gray-600 dark:text-gray-300 text-lg italic leading-relaxed"></p>
        </div>
    </div>

    <script>
        // Sonido de movimiento
        const moveSound = document.getElementById('move-sound');
        moveSound.volume = 0.3;

        function playMove() {
            moveSound.currentTime = 0;
            moveSound.play().catch(()=>{});
        }

        // --- TEMA OSCURO CON SONIDO ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            playMove(); // Sonido al cambiar tema
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
            themeIcon.classList.toggle('text-yellow-400', isDark);
        });

        // --- LÓGICA DE MODAL CON SONIDO ---
        const reviewModal = document.getElementById('review-modal');
        const modalContent = document.getElementById('review-modal-content');

        function openReviewModal(review) {
            playMove(); // Sonido al abrir algo
            document.getElementById('modal-name').textContent = review.name;
            document.getElementById('modal-text').textContent = `"${review.text}"`;
            // ... (Lógica de estrellas omitida por espacio)
            reviewModal.classList.remove('hidden');
            setTimeout(() => {
                reviewModal.classList.remove('opacity-0');
                modalContent.classList.replace('scale-95', 'scale-100');
            }, 10);
        }

        function closeReviewModal() {
            playMove(); // Sonido al cerrar
            reviewModal.classList.add('opacity-0');
            modalContent.classList.replace('scale-100', 'scale-95');
            setTimeout(() => reviewModal.classList.add('hidden'), 300);
        }

        document.getElementById('close-modal').onclick = closeReviewModal;

        // --- CARGA DE RESEÑAS (Simplificada para el ejemplo) ---
        const reviews = [{ name: "Su maldonado", stars: 5, color: "text-yellow-400", text: "Excelente atención..." }];
        const reviewsTrack = document.getElementById('reviews-track');
        reviews.forEach(review => {
            const card = document.createElement('div');
            card.className = "review-card border border-gray-200 dark:border-gray-800 p-6 bg-gray-100 dark:bg-darkCard rounded-2xl hover:border-brandOrange transition-colors cursor-pointer";
            card.onclick = () => openReviewModal(review);
            card.innerHTML = `<h4 class="font-bold dark:text-white">${review.name}</h4><p class="text-sm italic line-clamp-2">"${review.text}"</p>`;
            reviewsTrack.appendChild(card);
        });
    </script>
</body>
</html>
