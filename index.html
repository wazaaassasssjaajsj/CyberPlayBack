<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPlayBack | Gaming Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="theme-color" content="#ff5500">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brandOrange: '#ff5500',
                        darkSection: '#18181b',
                        darkBg: '#0f0f11',
                        darkCard: '#1e1e24'
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease; }
        .hide-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #ff5500; border-radius: 10px; }
        #chat-window {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0.8) translateY(100px);
            opacity: 0;
            pointer-events: none;
        }
        #chat-window.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
        }
        .dark .glass-effect { background: rgba(30, 30, 36, 0.9); }
    </style>
</head>
<body class="antialiased font-sans bg-[#fcfcfc] text-[#111] dark:bg-darkBg dark:text-gray-100">

    <div id="install-banner" class="hidden fixed top-0 left-0 w-full bg-brandOrange text-white p-3 z-[100] flex justify-between items-center md:hidden">
        <span class="text-xs font-bold tracking-widest uppercase">Instalá la App</span>
        <button id="install-btn" class="bg-white text-brandOrange px-4 py-1 rounded-full text-xs font-black">DESCARGAR</button>
    </div>

    <nav class="flex justify-between items-center px-6 md:px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-darkSection sticky top-0 z-50">
        <div class="font-bold text-lg tracking-wide uppercase">CyberPlayBack</div>
        <div class="hidden md:flex space-x-8 text-[11px] font-bold tracking-widest text-gray-500 dark:text-gray-400">
            <a href="#tarifas" class="hover:text-brandOrange transition-all">TARIFAS</a>
            <a href="#hardware" class="hover:text-brandOrange transition-all">PRODUCTOS</a>
            <a href="#comida" class="hover:text-brandOrange transition-all">KIOSCO</a>
        </div>
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-yellow-400">
                <i class="fas fa-moon text-lg" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <section class="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-gray-200 dark:divide-gray-800 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-darkSection text-center">
        <div class="py-8"><p class="text-[11px] font-bold text-gray-500 tracking-widest uppercase">PC</p><p class="text-4xl font-extrabold text-brandOrange">+20</p></div>
        <div class="py-8"><p class="text-[11px] font-bold text-gray-500 tracking-widest uppercase">LATENCIA</p><p class="text-4xl font-extrabold text-brandOrange">60ms</p></div>
        <div class="py-8"><p class="text-[11px] font-bold text-gray-500 tracking-widest uppercase">DISPONIBILIDAD</p><p class="text-4xl font-extrabold text-brandOrange">24/7</p></div>
    </section>

    <section class="py-12 px-6 md:px-8 max-w-7xl mx-auto">
        <h2 class="text-3xl font-extrabold tracking-tight mb-8">Mapa de PCs</h2>
        <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4" id="pc-grid"></div>
    </section>

    <section id="tarifas" class="bg-darkSection dark:bg-black text-white py-16 px-6">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-3xl font-extrabold mb-10">Tarifas y Promos</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-[#222] p-6 rounded-2xl border border-gray-700">
                    <h3 class="text-xl font-bold">Promo 1</h3>
                    <p class="text-gray-400 mb-4">2 Horas + 5 Puntos</p>
                    <p class="text-brandOrange font-black text-2xl">$4.000</p>
                </div>
                <div class="bg-[#222] p-6 rounded-2xl border border-blue-500 relative md:col-span-2">
                    <span class="absolute -top-3 right-4 bg-blue-500 text-white text-[10px] font-bold px-3 py-1 rounded-full">MÁS ELEGIDA</span>
                    <h3 class="text-xl font-bold text-blue-400">Promo Trasnoche 🌙</h3>
                    <p class="text-gray-400 mb-4">8 Horas de juego ininterrumpido (00:00 a 08:00)</p>
                    <p class="text-blue-400 font-black text-3xl">$9.000</p>
                </div>
            </div>
        </div>
    </section>

    <div class="fixed bottom-6 right-6 z-[60] flex flex-col items-end">
        <div id="chat-window" class="w-[90vw] md:w-[450px] h-[550px] glass-effect rounded-3xl shadow-2xl border border-gray-200 dark:border-gray-800 overflow-hidden mb-6 flex flex-col">
            <div class="bg-brandOrange p-5 text-white flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="w-10 h-10 bg-white rounded-full p-1">
                    <div>
                        <p class="text-xs font-black tracking-widest leading-none uppercase">Playback AI</p>
                        <p class="text-[10px] opacity-80 uppercase">Memoria Activada</p>
                    </div>
                </div>
                <button onclick="toggleChat()"><i class="fas fa-times"></i></button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50/50 dark:bg-black/10 hide-scrollbar"></div>
            <div class="p-4 bg-white dark:bg-darkSection border-t border-gray-100 dark:border-gray-800 flex gap-2">
                <input id="chat-input" type="text" placeholder="Escribe aquí..." class="flex-1 bg-gray-100 dark:bg-darkBg rounded-xl px-4 py-2 text-sm outline-none dark:text-white">
                <button onclick="sendMessage()" class="bg-brandOrange text-white w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button onclick="toggleChat()" class="w-16 h-16 bg-brandOrange text-white rounded-2xl shadow-xl flex items-center justify-center text-3xl hover:scale-110 transition-transform">
            <i class="fas fa-robot"></i>
        </button>
    </div>

    <audio id="pop-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
    <audio id="send-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <script>
        // 1. Mapa de PCs
        const pcGrid = document.getElementById('pc-grid');
        const specs = [{g:'4070', c:'i7'}, {g:'3080', c:'i7'}, {g:'3060', c:'i5'}];
        for (let i = 1; i <= 24; i++) {
            const s = specs[i % 3];
            pcGrid.innerHTML += `
                <div class="group border dark:border-gray-800 p-4 rounded-2xl bg-white dark:bg-darkCard hover:bg-brandOrange transition-all cursor-pointer">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="w-2 h-2 rounded-full bg-red-500 group-hover:bg-white"></span>
                        <span class="text-[10px] font-bold text-gray-400 group-hover:text-white uppercase">PC ${i.toString().padStart(2,'0')}</span>
                    </div>
                    <p class="font-black text-xl group-hover:text-white">RTX ${s.g}</p>
                </div>`;
        }

        // 2. Modo Oscuro (Corregido)
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.className = isDark ? 'fas fa-sun text-lg' : 'fas fa-moon text-lg';
        };
        themeBtn.addEventListener('click', toggleTheme);
        if (localStorage.getItem('theme') === 'dark') toggleTheme();

        // 3. IA Chat con Memoria
        let history = JSON.parse(localStorage.getItem('cyberHistory')) || [
            { t: "¡Hola! Soy la IA de CyberPlayBack. ¿En qué te ayudo?", s: 'ai' }
        ];

        const render = () => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = history.map(m => `
                <div class="flex flex-col ${m.s === 'ai' ? 'items-start' : 'items-end'}">
                    <div class="${m.s === 'ai' ? 'bg-white dark:bg-darkCard' : 'bg-brandOrange text-white'} p-3 rounded-2xl shadow-sm text-sm max-w-[85%]">
                        ${m.t}
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        };

        const playSfx = (id) => { document.getElementById(id).play(); };
        const toggleChat = () => { 
            document.getElementById('chat-window').classList.toggle('active'); 
            playSfx('pop-sound');
        };

        const sendMessage = () => {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            
            history.push({ t: input.value, s: 'user' });
            const val = input.value.toLowerCase();
            input.value = "";
            playSfx('send-sound');
            render();

            setTimeout(() => {
                let r = "No estoy seguro, pero si vienes al local te asesoramos mejor. ¿Quieres el WhatsApp?";
                if(val.includes("hola")) r = "¡Hola! ¿Buscabas alguna promo o spec de PC?";
                if(val.includes("promo")) r = "La de trasnoche está $9.000, ¡es la que más sale!";
                if(val.includes("pc")) r = "Tenemos RTX 3060, 3080 y la joya: la 4070.";
                
                history.push({ t: r, s: 'ai' });
                localStorage.setItem('cyberHistory', JSON.stringify(history));
                render();
                playSfx('pop-sound');
            }, 800);
        };

        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key==='Enter') sendMessage(); });
        render();

        // 4. PWA
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });
        document.getElementById('install-btn').addEventListener('click', () => {
            if (window.deferredPrompt) window.deferredPrompt.prompt();
        });
    </script>
</body>
</html>
