<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Playback</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0e0e0e;
color:white;
overflow-x:hidden;
}

/* ================= HEADER ================= */

header{
padding:80px 20px;
text-align:center;
background:linear-gradient(180deg,#000,#111);
}

.logo-container{
margin-bottom:20px;
}

.logo-container img{
width:140px;
height:140px;
object-fit:cover;
border-radius:50%;
border:4px solid #ff6a00;
box-shadow:0 0 25px #ff6a00;
}

header h1{
font-size:42px;
color:#ff6a00;
letter-spacing:3px;
}

header p{
margin-top:10px;
opacity:0.8;
font-size:18px;
}

/* ================= MENU BUTTON ================= */

.menu-btn{
position:fixed;
top:25px;
right:25px;
width:40px;
height:30px;
cursor:pointer;
z-index:2000;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.menu-btn span{
height:5px;
background:#ff6a00;
border-radius:5px;
transition:0.6s cubic-bezier(.77,0,.18,1);
}

.menu-btn.active span:nth-child(1){
transform:translateY(12px) rotate(45deg) scaleX(1.3);
}

.menu-btn.active span:nth-child(2){
opacity:0;
}

.menu-btn.active span:nth-child(3){
transform:translateY(-12px) rotate(-45deg) scaleX(1.3);
}

/* ================= OVERLAY ================= */

.overlay{
position:fixed;
inset:0;
background:#ff6a00;
clip-path:circle(0% at 100% 0%);
transition:0.8s cubic-bezier(.77,0,.18,1);
z-index:1500;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.overlay.active{
clip-path:circle(150% at 50% 50%);
}

.overlay-logo{
font-size:45px;
font-weight:bold;
margin-bottom:40px;
opacity:0;
transform:translateY(-40px);
transition:0.6s ease 0.4s;
}

.overlay.active .overlay-logo{
opacity:1;
transform:translateY(0);
}

.overlay ul{
list-style:none;
text-align:center;
}

.overlay li{
font-size:22px;
margin:18px 0;
opacity:0;
transform:translateY(30px);
transition:0.5s ease;
}

.overlay.active li{
opacity:1;
transform:translateY(0);
}

/* ================= SECTIONS ================= */

.section{
padding:80px 20px;
text-align:center;
max-width:1200px;
margin:auto;
}

.section h2{
color:#ff6a00;
margin-bottom:30px;
font-size:28px;
}

/* GRID PARA PC */

.cards-container{
display:flex;
flex-direction:column;
gap:20px;
}

.card{
background:#1a1a1a;
border:1px solid #ff6a00;
padding:25px;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ff6a00;
}

/* ================= CHATBOT ================= */

.chat-btn{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#ff6a00;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
box-shadow:0 0 20px #ff6a00;
z-index:1000;
}

.chat-window{
position:fixed;
bottom:100px;
right:25px;
width:300px;
background:#111;
border:1px solid #ff6a00;
border-radius:12px;
padding:15px;
display:none;
animation:fadeUp 0.3s ease;
}

.chat-window.active{
display:block;
}

.chat-options button{
width:100%;
margin:6px 0;
padding:8px;
border:none;
background:#ff6a00;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* ================= RESPONSIVE PC ================= */

@media(min-width:768px){

header h1{
font-size:60px;
}

.logo-container img{
width:180px;
height:180px;
}

.cards-container{
flex-direction:row;
justify-content:center;
}

.card{
width:300px;
}

.chat-window{
width:350px;
}

}
</style>
</head>
<body>

<div class="menu-btn" id="menuBtn">
<span></span>
<span></span>
<span></span>
</div>

<div class="overlay" id="overlay">
<div class="overlay-logo">PLAYBACK</div>
<ul>
<li>📞 +54 9 381 507-4982</li>
<li>📧 cyberplayback@gmail.com</li>
<li>💳 MercadoPago</li>
<li>💵 Efectivo</li>
</ul>
</div>

<header>
<div class="logo-container">
<img src="logo.png" alt="Logo">
</div>
<h1>CYBER PLAYBACK</h1>
<p>Playback Esport Center</p>
</header>

<section class="section">
<h2>📍 Dirección</h2>
<div class="card">25 DE MAYO 657</div>
</section>

<section class="section">
<h2>⚡ Servicios</h2>
<div class="cards-container">
<div class="card">500 MEGAS FIBRA ÓPTICA</div>
<div class="card">MONITORES 240HZ</div>
<div class="card">TORNEOS Y RANKEDS</div>
</div>
</section>


<div class="chat-btn" id="chatBtn">💬</div>

<div class="chat-window" id="chatWindow">
<b>CyberBot 🤖</b>
<p>Hola 👋 ¿Qué querés hacer?</p>
<div class="chat-options">
<button onclick="window.location.href='https://wa.me/5493813515470'">🎮 Reservar PC</button>
<button onclick="alert('Estamos abiertos 24HS 🔥')">🕒 Ver horarios</button>
<button onclick="window.location.href='https://wa.me/5493813515470'">👨‍💻 Hablar con empleado</button>
</div>
</div>

<script>
const menuBtn=document.getElementById("menuBtn");
const overlay=document.getElementById("overlay");
menuBtn.addEventListener("click",()=>{
menuBtn.classList.toggle("active");
overlay.classList.toggle("active");
});

const chatBtn=document.getElementById("chatBtn");
const chatWindow=document.getElementById("chatWindow");
chatBtn.addEventListener("click",()=>{
chatWindow.classList.toggle("active");
});
</script>

</body>
</html>
